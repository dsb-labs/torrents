name: ui

concurrency:
  group: ${{ github.workflow }}/${{ github.ref_name }}

on:
  push:
    branches:
      - main
    paths:
      - '**.templ'
      - 'internal/server/ui/input.css'
      - 'internal/server/ui/tailwind.config.js'
      - 'internal/server/ui/package.json'
      - 'internal/server/ui/yarn.lock'
      - 'internal/server/ui/static/**'
      - '.github/workflows/ui.yml'
  pull_request:
    paths:
      - '**.templ'
      - 'internal/server/ui/input.css'
      - 'internal/server/ui/tailwind.config.js'
      - 'internal/server/ui/package.json'
      - 'internal/server/ui/yarn.lock'
      - 'internal/server/ui/static/**'
      - '.github/workflows/ui.yml'

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: internal/server/ui
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          cache: yarn
          cache-dependency-path: internal/server/ui/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Check for drift
        working-directory: ${{ github.workspace }}
        run: |
          git add .
          git diff --staged --exit-code
